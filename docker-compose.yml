services:
  postgres_auth:
    image: postgres:16-alpine
    container_name: gobank_postgres_auth
    environment:
      POSTGRES_DB: gobank_auth
      POSTGRES_USER: gobank
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gobank -d gobank_auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
    - gobank

  postgres_wallet:
    image: postgres:16-alpine
    container_name: gobank_postgres_wallet
    environment:
      POSTGRES_DB: gobank_wallet
      POSTGRES_USER: gobank
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_wallet_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gobank -d gobank_wallet"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
    - gobank

  redis:
    image: redis:7-alpine
    container_name: gobank-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass secret
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "secret", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
    - gobank

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gobank-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
    - gobank
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: gobank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
    - gobank

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: gobank_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
    - gobank

  auth:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth
    container_name: gobank-auth
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      DB_URL: postgres://gobank:secret@postgres_auth:5432/gobank_auth?sslmode=disable
      JWT_SECRET: secret
      REDIS_URL: redis:6379
      REDIS_PASSWORD: secret
      JAEGER_ENDPOINT: jaeger:4317
    depends_on:
      postgres_auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gobank

  wallet:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: wallet
    container_name: gobank_wallet
    ports:
      - "8081:8080"
    environment:
      DB_URL_WALLET: postgres://gobank:secret@postgres_wallet:5432/gobank_wallet?sslmode=disable
      KAFKA_BROKERS: kafka:29092
      AUTH_GRPC_ADDR: auth:9090
      JAEGER_ENDPOINT: jaeger:4317
    depends_on:
      postgres_wallet:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - gobank

  notification:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: notification
    container_name: gobank_notification
    environment:
      KAFKA_BROKERS: kafka:29092
      JAEGER_ENDPOINT: jaeger:4317
    depends_on:
      kafka:
        condition: service_healthy
    networks:
    - gobank    
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: gobank-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - auth
      - wallet
    networks:
      - gobank

  grafana:
    image: grafana/grafana:10.4.0
    container_name: gobank-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
    - gobank

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: gobank-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - gobank
    
networks:
  gobank:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_wallet_data:
  grafana_data: