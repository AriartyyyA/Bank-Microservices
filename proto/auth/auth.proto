syntax = "proto3";

package auth;

option go_package = "github.com/AriartyyyA/gobank/proto/auth";

service AuthService {
    rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
    string token = 1;
}

message ValidateTokenResponse {
    string user_id = 1;
    string email = 2;
}