apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gobank
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: "gobank-auth"
        metrics_path: /metrics
        static_configs:
          - targets: ["auth:8080"]
      - job_name: "gobank-wallet"
        metrics_path: /metrics
        static_configs:
          - targets: ["wallet:8080"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gobank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gobank
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
